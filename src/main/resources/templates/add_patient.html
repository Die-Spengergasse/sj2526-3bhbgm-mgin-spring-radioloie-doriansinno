<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Patient registrieren</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
</head>
<body>
<div class="container">
    <h2>Neuen Patienten registrieren</h2>

    <form th:action="@{/patient/add}" th:object="${patient}" method="post">
        <div th:if="${#fields.hasAnyErrors()}" class="alert alert-danger">
            <div th:each="err : ${#fields.allErrors()}" th:text="${err}"></div>
        </div>

        <div class="form-group" th:classappend="${#fields.hasErrors('svnr')} ? 'has-error'">
            <label for="svnr">Sozialversicherungsnummer</label>
            <input id="svnr" type="text" th:field="*{svnr}" class="form-control" placeholder="10 Ziffern" maxlength="10" required>
            <span class="help-block" th:if="${#fields.hasErrors('svnr')}" th:errors="*{svnr}"></span>
        </div>

        <div class="form-group" th:classappend="${#fields.hasErrors('firstName')} ? 'has-error'">
            <label for="firstName">Vorname</label>
            <input id="firstName" type="text" th:field="*{firstName}" class="form-control" required>
            <span class="help-block" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></span>
        </div>

        <div class="form-group" th:classappend="${#fields.hasErrors('lastName')} ? 'has-error'">
            <label for="lastName">Nachname</label>
            <input id="lastName" type="text" th:field="*{lastName}" class="form-control" required>
            <span class="help-block" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></span>
        </div>

        <div class="form-group" th:classappend="${#fields.hasErrors('gender')} ? 'has-error'">
            <label for="gender">Geschlecht</label>
            <select id="gender" th:field="*{gender}" class="form-control" required>
                <option value="">Bitte w&auml;hlen</option>
                <option value="M">M&auml;nnlich</option>
                <option value="W">Weiblich</option>
                <option value="D">Divers</option>
            </select>
            <span class="help-block" th:if="${#fields.hasErrors('gender')}" th:errors="*{gender}"></span>
        </div>

        <div class="form-group" th:classappend="${#fields.hasErrors('birth')} ? 'has-error'">
            <label for="birth">Geburtsdatum</label>
            <input id="birth" type="date" th:field="*{birth}" class="form-control" required>
            <span class="help-block" th:if="${#fields.hasErrors('birth')}" th:errors="*{birth}"></span>
        </div>

        <div class="form-group">
            <button type="submit" class="btn btn-primary">Speichern</button>
            <a th:href="@{/patient/list}" class="btn btn-default">Abbrechen</a>
        </div>
    </form>
</div>
</body>
</html>
