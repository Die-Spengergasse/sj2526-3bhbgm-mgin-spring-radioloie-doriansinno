<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reservierung erfassen</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
</head>
<body>
<div class="container">
    <h2>Neue Reservierung</h2>

    <div th:if="${#lists.isEmpty(patients)}" class="alert alert-warning">
        Es ist noch kein Patient registriert. Bitte zuerst einen Patienten anlegen.
    </div>

    <form th:action="@{/reservation/add}" th:object="${reservationForm}" method="post">
        <div th:if="${#fields.hasAnyErrors()}" class="alert alert-danger">
            <div th:each="err : ${#fields.allErrors()}" th:text="${err}"></div>
        </div>

        <div class="form-group">
            <label for="patientId">Patient</label>
            <select id="patientId" th:field="*{patientId}" class="form-control" required>
                <option value="">Bitte w&auml;hlen</option>
                <option th:each="p : ${patients}" th:value="${p.id}" th:text="${p.fullName + ' (' + p.svnr + ')'}"></option>
            </select>
        </div>

        <div class="form-group">
            <label for="deviceId">Ger&auml;t</label>
            <select id="deviceId" th:field="*{deviceId}" class="form-control" required>
                <option value="">Bitte w&auml;hlen</option>
                <option th:each="d : ${devices}" th:value="${d.id}" th:text="${d.name + ' - ' + d.type + ' (' + d.location + ')'}"></option>
            </select>
        </div>

        <div class="form-group">
            <label for="date">Datum</label>
            <input id="date" type="date" th:field="*{date}" class="form-control" required>
        </div>

        <div class="form-group">
            <label for="startTime">Startzeit</label>
            <input id="startTime" type="time" th:field="*{startTime}" class="form-control" required>
        </div>

        <div class="form-group">
            <label for="endTime">Endzeit</label>
            <input id="endTime" type="time" th:field="*{endTime}" class="form-control" required>
        </div>

        <div class="form-group" th:classappend="${#fields.hasErrors('bodyRegion')} ? 'has-error'">
            <label for="bodyRegion">K&ouml;rperregion</label>
            <select id="bodyRegion" th:field="*{bodyRegion}" class="form-control" required>
                <option value="">Bitte w&auml;hlen</option>
                <option th:each="region : ${bodyRegions}" th:value="${region}" th:text="${region}"></option>
            </select>
            <span class="help-block" th:if="${#fields.hasErrors('bodyRegion')}" th:errors="*{bodyRegion}"></span>
        </div>

        <div class="form-group">
            <label for="comment">Kommentar</label>
            <textarea id="comment" th:field="*{comment}" class="form-control" rows="3" placeholder="Zus&auml;tzliche Hinweise"></textarea>
        </div>

        <div class="form-group">
            <button type="submit" class="btn btn-primary" th:disabled="${#lists.isEmpty(patients)}">Speichern</button>
            <a th:href="@{/patient/add}" class="btn btn-default">Patient registrieren</a>
            <a th:href="@{/device/list}" class="btn btn-default">Abbrechen</a>
        </div>
    </form>
</div>
</body>
</html>
