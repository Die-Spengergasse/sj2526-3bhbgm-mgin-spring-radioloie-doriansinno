<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Patientenliste</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
</head>
<body>
<div class="container">
    <h2>Patientenliste</h2>
    <p>
        <a class="btn btn-primary" th:href="@{/patient/add}">Neuen Patienten registrieren</a>
        <a class="btn btn-default" th:href="@{/}">Zur Startseite</a>
    </p>

    <table class="table table-striped">
        <thead>
        <tr>
            <th>SVNR</th>
            <th>Vorname</th>
            <th>Nachname</th>
            <th>Geschlecht</th>
            <th>Geburtsdatum</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${#lists.isEmpty(patients)}">
            <td colspan="5">Noch keine Patienten registriert.</td>
        </tr>
        <tr th:each="p : ${patients}">
            <td th:text="${p.svnr}"></td>
            <td th:text="${p.firstName}"></td>
            <td th:text="${p.lastName}"></td>
            <td th:text="${p.gender}"></td>
            <td th:text="${p.birth}"></td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
